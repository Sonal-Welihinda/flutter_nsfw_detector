name: flutter_nsfw_detector
description: >
  On-device NSFW content detection for Flutter. Privacy-first image & video
  scanning using CoreML (iOS) and LiteRT/TFLite (Android). Includes a
  ready-to-use NsfwGuardWidget that auto-blurs unsafe content.
version: 0.0.2
homepage: https://github.com/Sonal-Welihinda/flutter_nsfw_detector
repository: https://github.com/Sonal-Welihinda/flutter_nsfw_detector
issue_tracker: https://github.com/Sonal-Welihinda/flutter_nsfw_detector/issues

topics:
  - nsfw
  - content-moderation
  - machine-learning
  - on-device-ml

environment:
  sdk: ^3.11.3
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: lk.sonal.flutter_nsfw_detector
        pluginClass: FlutterNsfwDetectorPlugin
      ios:
        pluginClass: FlutterNsfwDetectorPlugin
